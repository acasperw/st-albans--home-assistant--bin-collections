<div class="clock-overlay" [class.active]="active()" aria-hidden="true">
	<app-weather-badge [active]="active()" />
	<div class="clock-face">
		<span class="time-main">{{ time() }}</span>
		<span class="time-seconds">{{ seconds() }}</span>
	</div>
	@if (upcomingMeal()) {
		<div class="tomorrow-meal">
			<span class="tomorrow-label">{{ upcomingMealLabel() }}</span>
			<span class="tomorrow-name">{{ upcomingMeal() }}</span>
		</div>
	}
</div>
